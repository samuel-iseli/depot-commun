{% extends 'store/base.html' %}

{% block navbar_title %}Artikel wählen{% endblock %}

{% block content %}
<div class="uk-container"> 
    <ul class="uk-list uk-list-divider">
    {% for article in articles %}
        <li hx-post="{% url 'store:create-purchase' basket_id=basket_id article_id=article.id %}" hx-target="#body">{{ article.name }} - {{ article.price }}</li>
    {% endfor %}
    </ul>
</div>
{% endblock %}
