{% extends 'store/base.html' %}

{% block title %}Depot Commun | Benutzer hinzufügen{% endblock %}

{% block content %}
<ion-card>
  <ion-card-header>
    <ion-card-title>Neuen Benutzer hinzufügen für Kunde: {{ selected_customer.name }}</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form method="post">
      {% csrf_token %}
      <ion-list lines="full">
        <ion-item>
          <ion-label position="stacked">E-Mail</ion-label>
          <ion-input name="email" type="email" required maxlength="150" autocomplete="email"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Vorname</ion-label>
          <ion-input name="first_name" type="text" required maxlength="150" autocomplete="given-name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Nachname</ion-label>
          <ion-input name="last_name" type="text" required maxlength="150" autocomplete="family-name"></ion-input>
        </ion-item>
        {% if error %}
        <ion-item lines="none">
          <ion-note color="danger" slot="end">{{ error }}</ion-note>
        </ion-item>
        {% endif %}
      </ion-list>
      <ion-button expand="block" type="submit" style="margin-top: 16px;">Benutzer anlegen</ion-button>
    </form>
  </ion-card-content>
</ion-card>
{% endblock %}
